name: Release

# Build installers for all three platforms.
# - Push a version tag (e.g. v1.0.0)  -> builds + publishes a GitHub draft release.
# - Manual "Run workflow" (dispatch)  -> builds only, uploads artifacts (no release).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # required for electron-builder to create the GitHub release

jobs:
  verify:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  release:
    name: Build (${{ matrix.os }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Build renderer + main bundles
        run: npm run build

      - name: Package (and publish on tags)
        run: npx --no-install electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No code-signing certs in CI — produce unsigned builds rather than failing.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v5
        with:
          name: catch-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*.exe
            release/**/*.AppImage
            release/**/*.deb
